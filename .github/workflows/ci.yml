# ============ ELECTROLAND CI PIPELINE ============
# Runs on every push/PR to main branch
# Steps: Install → Test → Coverage → Docker Build Verification

name: Electroland CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============ TEST JOB ============
  test:
    name: Run Tests & Coverage
    runs-on: ubuntu-latest

    services:
      # MongoDB service for integration tests
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis service for cache tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # ---- SERVER TESTS ----
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server tests with coverage
        working-directory: ./server
        env:
          MONGO_URI: mongodb://localhost:27017/electroland_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret_key
          NODE_ENV: test
        run: npm run test:ci

      - name: Upload test coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 30

      # ---- CLIENT LINT ----
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint client code
        working-directory: ./client
        run: npm run lint || true

  # ============ DOCKER BUILD JOB ============
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Verify containers start
        run: |
          docker compose up -d
          sleep 15
          docker compose ps
          docker compose down
