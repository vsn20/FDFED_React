# ============ NGINX CONFIGURATION ============
# SPA routing + API reverse proxy for Electroland React frontend

server {
    listen 80;
    server_name localhost;

    # Serve static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API requests to backend server
    location /api/ {
        proxy_pass http://server:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Reverse proxy Swagger docs
    location /api-docs {
        proxy_pass http://server:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Reverse proxy WebSocket connections for Socket.io
    location /socket.io/ {
        proxy_pass http://server:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Serve uploaded files
    location /uploads/ {
        proxy_pass http://server:5001;
        proxy_set_header Host $host;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
